# ============================================================
# Qwen Safety Classifier — Unsloth Configuration
# Unsloth FastLanguageModel (~3GB VRAM, 2-2.7x faster)
# ============================================================

# ── Model ────────────────────────────────────────────────────
model:
  name: "unsloth/Qwen3.5-0.8B"
  max_seq_length: 2048
  max_new_tokens: 256

# ── QLoRA ────────────────────────────────────────────────────
lora:
  r: 8
  alpha: 16
  dropout: 0.0
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  bias: "none"
  task_type: "CAUSAL_LM"

# ── Training ─────────────────────────────────────────────────
training:
  output_dir: "output/unsloth_checkpoint"
  num_train_epochs: 3
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 16
  learning_rate: 2.0e-4
  lr_scheduler_type: "linear"
  warmup_steps: 100
  weight_decay: 0.01
  optim: "adamw_torch"
  bf16: false
  fp16: true
  save_strategy: "steps"
  save_steps: 200
  eval_strategy: "steps"
  eval_steps: 200
  logging_steps: 10
  load_best_model_at_end: true
  metric_for_best_model: "eval_f1"
  greater_is_better: true
  report_to: "none"
  dataloader_num_workers: 2

# ── Merge / Export ───────────────────────────────────────────
merge:
  merged: "output/unsloth_merged"

# ── Evaluation ───────────────────────────────────────────────
eval:
  results_dir:    "output/eval_results/unsloth"
  bertscore_lang: "id"
  manual_eval_n:  50

# ── Debug ─────────────────────────────────────────────────────
debug:
  enabled: true          # set false during real training runs
  n_samples: 2           # how many samples to show in debug output
  show_converted: true   # show convert_to_conversation output
  show_raw: true         # show raw dataset sample (pre-conversion)
  show_tokenized: true   # show token count per sample
  show_gpu: true         # show GPU memory stats before training

# ── Smoke Test ────────────────────────────────────────────────
# Quick end-to-end run to verify full pipeline (load → train → save → eval)
# Activated by: python train_unsloth.py debug=on
smoke_test:
  max_samples: 32        # use only N train + N val samples
  num_train_epochs: 1    # just 1 epoch
  max_steps: 4           # stop after 4 optimizer steps
  save_steps: 2          # save checkpoint early
  eval_steps: 2          # eval early
  logging_steps: 1       # log every step