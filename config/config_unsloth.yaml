# ============================================================
# Qwen Safety Classifier — Unsloth Configuration
# Unsloth FastLanguageModel (~3GB VRAM, 2-2.7x faster)
# ============================================================

# ── Model ────────────────────────────────────────────────────
model:
  name: "unsloth/Qwen3.5-0.8B"
  max_seq_length: 2048
  max_new_tokens: 256

# ── QLoRA ────────────────────────────────────────────────────
lora:
  r: 8
  alpha: 16
  dropout: 0.0
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  bias: "none"
  task_type: "CAUSAL_LM"

# ── Training ─────────────────────────────────────────────────
training:
  output_dir: "output/unsloth_checkpoint"
  num_train_epochs: 3
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 16
  learning_rate: 2.0e-4
  lr_scheduler_type: "linear"
  warmup_steps: 100
  weight_decay: 0.01
  optim: "adamw_torch"
  bf16: false
  fp16: true
  save_strategy: "steps"
  save_steps: 200
  eval_strategy: "steps"
  eval_steps: 200
  logging_steps: 10
  load_best_model_at_end: true
  metric_for_best_model: "eval_f1"
  greater_is_better: true
  report_to: "none"
  dataloader_num_workers: 2

# ── Merge / Export ───────────────────────────────────────────
merge:
  merged: "output/unsloth_merged"

# ── Evaluation ───────────────────────────────────────────────
eval:
  results_dir:    "output/eval_results/unsloth"
  bertscore_lang: "id"
  manual_eval_n:  50